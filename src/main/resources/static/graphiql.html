<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GraphiQL</title>
  <style>
    * { box-sizing: border-box; }
    body { height: 100%; margin: 0; width: 100%; overflow: hidden; }
    #graphiql { height: 100vh; }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/graphiql@3.7.1/graphiql.min.css" />
</head>
<body>
  <div id="graphiql"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/graphiql@3.7.1/graphiql.min.js"></script>
  <script src="https://unpkg.com/graphql-ws@5.14.0/umd/graphql-ws.js"></script>

  <script>
    const root = ReactDOM.createRoot(document.getElementById('graphiql'));
    root.render(
      React.createElement(GraphiQL, {
        fetcher: GraphiQL.createFetcher({
          url: '/graphql',
          subscriptionUrl: 'ws://localhost:8081/graphql-ws'
        }),
        defaultEditorToolsVisibility: true
      })
    );
  </script>
</body>
</html>
