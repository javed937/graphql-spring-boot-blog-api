spring.application.name=graphql-spring-boot-blog-api
server.port=8081

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:blogdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (visit http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# GraphiQL UI (built-in disabled — CDN refs broken in v5.2.2, using custom page instead)
spring.graphql.graphiql.enabled=false

# Logging
logging.level.com.learn.graphql=DEBUG
logging.level.org.springframework.graphql=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
